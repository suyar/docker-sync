name: Sync Gitea Runner

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync-gitea-runner.yml'

concurrency:
  group: sync-gitea-runner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:

    runs-on: ubuntu-latest

    strategy:
      max-parallel: 2
      matrix:
        version:
          - "0.2.12"
          - "0.2.13"
          - "0.3.0"

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Aliyun
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ secrets.ALI_DOCKER_REPO }}
          username: ${{ secrets.ALI_DOCKER_USER }}
          password: ${{ secrets.ALI_DOCKER_PASS }}

      - name: Copy gitea/act_runner:${{ matrix.version }} (buildx imagetools)
        env:
          SRC: ${{ secrets.DOCKERHUB_MIRROR }}/gitea/act_runner:${{ matrix.version }}
          DST: ${{ secrets.ALI_DOCKER_REPO }}/mirrors_hub/gitea_runner:${{ matrix.version }}
        run: |
          SRC_DIGEST="$(docker buildx imagetools inspect "$SRC" | awk '/^Digest:/ {print $2; exit}')"
          DST_DIGEST="$(docker buildx imagetools inspect "$DST" 2>/dev/null | awk '/^Digest:/ {print $2; exit}' || true)"
          if [ -z "$SRC_DIGEST" ]; then
            echo "Failed to resolve source digest: $SRC"
            exit 1
          fi
          if [ -n "$DST_DIGEST" ] && [ "$SRC_DIGEST" = "$DST_DIGEST" ]; then
            echo "Digest unchanged ($SRC_DIGEST), skip sync."
            exit 0
          fi
          docker buildx imagetools create --tag "$DST" "$SRC"
