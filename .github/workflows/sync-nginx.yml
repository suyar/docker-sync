name: Sync Nginx

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync-nginx.yml'
  workflow_dispatch:

concurrency:
  group: sync-nginx-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:

    runs-on: ubuntu-latest

    strategy:
      max-parallel: 8
      matrix:
        version:
          - "1.28"
          - "1.28.3"

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Aliyun
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ secrets.HW_DOCKER_REPO }}
          username: ${{ secrets.HW_DOCKER_USER }}
          password: ${{ secrets.HW_DOCKER_PASS }}

      - name: Copy nginx:${{ matrix.version }} (buildx imagetools)
        env:
          SRC: ${{ secrets.DOCKERHUB_MIRROR }}/library/nginx:${{ matrix.version }}
          DST: ${{ secrets.HW_DOCKER_REPO }}/mirrors_hub/nginx:${{ matrix.version }}
        run: |
          SRC_DIGEST="$(docker buildx imagetools inspect "$SRC" | awk '/^Digest:/ {print $2; exit}')"
          DST_DIGEST="$(docker buildx imagetools inspect "$DST" 2>/dev/null | awk '/^Digest:/ {print $2; exit}' || true)"
          if [ -z "$SRC_DIGEST" ]; then
            echo "Failed to resolve source digest: $SRC"
            exit 1
          fi
          if [ -n "$DST_DIGEST" ] && [ "$SRC_DIGEST" = "$DST_DIGEST" ]; then
            echo "Digest unchanged ($SRC_DIGEST), skip sync."
            exit 0
          fi
          docker buildx imagetools create --tag "$DST" "$SRC"
