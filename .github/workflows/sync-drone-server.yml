name: Sync Drone Server

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync-drone-server.yml'
  workflow_dispatch:

concurrency:
  group: sync-drone-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:

    runs-on: ubuntu-latest

    strategy:
      max-parallel: 2
      matrix:
        version:
          - "2"
          - "2.28.2"

    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to Cloud
        env:
          REGISTRY: ${{ secrets.TC_DOCKER_REPO }}
          USERNAME: ${{ secrets.TC_DOCKER_USER }}
          PASSWORD: ${{ secrets.TC_DOCKER_PASS }}
        run: |
          echo "$PASSWORD" | skopeo login --username "$USERNAME" --password-stdin "$REGISTRY"

      - name: Copy drone/drone:${{ matrix.version }} (skopeo)
        env:
          SRC: ${{ secrets.DOCKERHUB_MIRROR }}/drone/drone:${{ matrix.version }}
          DST: ${{ secrets.TC_DOCKER_REPO }}/mirrors_hub/drone_server:${{ matrix.version }}
        run: |
          set -o pipefail

          SKOPEO_PLATFORM=(--override-os linux --override-arch amd64)

          SRC_DIGEST="$(skopeo inspect "${SKOPEO_PLATFORM[@]}" --format '{{.Digest}}' "docker://$SRC" 2>/dev/null || true)"
          if [ -z "$SRC_DIGEST" ]; then
            echo "Failed to resolve source digest: $SRC"
            exit 1
          fi

          DST_DIGEST="$(skopeo inspect "${SKOPEO_PLATFORM[@]}" --format '{{.Digest}}' "docker://$DST" 2>/dev/null || true)"

          if [ -n "$DST_DIGEST" ] && [ "$SRC_DIGEST" = "$DST_DIGEST" ]; then
            echo "Digest unchanged ($SRC_DIGEST), skip sync."
            exit 0
          fi

          skopeo copy "${SKOPEO_PLATFORM[@]}" --retry-times 3 "docker://$SRC" "docker://$DST"
