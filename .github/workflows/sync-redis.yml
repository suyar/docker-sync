name: Sync Redis

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync-redis.yml'

jobs:
  sync:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        version:
          - "6"
          - "6.2"
          - "6.2.1"
          - "7"
          - "7.2"
          - "7.2.13"
          - "7.4"
          - "7.4.8"
          - "8"
          - "8.0"
          - "8.0.6"
          - "8.2"
          - "8.2.5"
          - "8.4"
          - "8.4.2"
          - "8.6"
          - "8.6.1"

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Aliyun
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ secrets.ALI_DOCKER_REPO }}
          username: ${{ secrets.ALI_DOCKER_USER }}
          password: ${{ secrets.ALI_DOCKER_PASS }}

      - name: Copy redis:${{ matrix.version }} (buildx imagetools)
        env:
          SRC: docker.io/library/redis:${{ matrix.version }}
          DST: ${{ secrets.ALI_DOCKER_REPO }}/mirrors_hub/redis:${{ matrix.version }}
        run: |
          docker buildx imagetools create --tag "$DST" "$SRC"
