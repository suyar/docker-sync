name: Sync MySQL

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync-mysql.yml'

jobs:
  sync:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        version:
          - "8.0"
          - "8.0.45"
          - "8.4"
          - "8.4.8"

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Aliyun
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ secrets.ALI_DOCKER_REPO }}
          username: ${{ secrets.ALI_DOCKER_USER }}
          password: ${{ secrets.ALI_DOCKER_PASS }}

      - name: Copy mysql:${{ matrix.version }} (buildx imagetools)
        env:
          SRC: docker.io/library/mysql:${{ matrix.version }}
          DST: ${{ secrets.ALI_DOCKER_REPO }}/mirrors_hub/mysql:${{ matrix.version }}
        run: |
          docker buildx imagetools create --tag "$DST" "$SRC"
