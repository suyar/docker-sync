name: Sync MySQL

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync-mysql.yml'
  workflow_dispatch:

concurrency:
  group: sync-mysql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:

    runs-on: ubuntu-latest

    strategy:
      max-parallel: 2
      matrix:
        version:
          - "8.0"
          - "8.0.46"
          - "8.4"
          - "8.4.9"
          - "9.6"
          - "9.6.0"

    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to Cloud
        env:
          REGISTRY: ${{ secrets.TC_DOCKER_REPO }}
          USERNAME: ${{ secrets.TC_DOCKER_USER }}
          PASSWORD: ${{ secrets.TC_DOCKER_PASS }}
        run: |
          echo "$PASSWORD" | skopeo login --username "$USERNAME" --password-stdin "$REGISTRY"

      - name: Copy mysql:${{ matrix.version }} (skopeo)
        env:
          SRC: ${{ secrets.DOCKERHUB_MIRROR }}/library/mysql:${{ matrix.version }}
          DST: ${{ secrets.TC_DOCKER_REPO }}/mirrors_hub/mysql:${{ matrix.version }}
        run: |
          set -o pipefail

          SRC_RAW="$(mktemp)"
          DST_RAW="$(mktemp)"
          trap 'rm -f "$SRC_RAW" "$DST_RAW"' EXIT

          if ! skopeo inspect --raw "docker://$SRC" > "$SRC_RAW" 2>/dev/null || [ ! -s "$SRC_RAW" ]; then
            echo "Failed to resolve source digest: $SRC"
            exit 1
          fi
          SRC_DIGEST="sha256:$(sha256sum "$SRC_RAW" | awk '{print $1}')"

          DST_DIGEST=""
          if skopeo inspect --raw "docker://$DST" > "$DST_RAW" 2>/dev/null && [ -s "$DST_RAW" ]; then
            DST_DIGEST="sha256:$(sha256sum "$DST_RAW" | awk '{print $1}')"
          fi

          if [ -n "$DST_DIGEST" ] && [ "$SRC_DIGEST" = "$DST_DIGEST" ]; then
            echo "Digest unchanged ($SRC_DIGEST), skip sync."
            exit 0
          fi

          skopeo copy --multi-arch all --retry-times 3 "docker://$SRC" "docker://$DST"
