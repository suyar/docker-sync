  # ---------- mysql (patch only) ----------
  - package-ecosystem: docker-compose
    directory: /dependabot/mysql-8.0
    registries:
      - dockerhub
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "feat"
    ignore:
      - dependency-name: "mysql"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"

