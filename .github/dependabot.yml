version: 2

registries:
  dockerhub:
    type: docker-registry
    # 将未带 registry 主机的镜像按 Hub 规则解析到该地址（replaces-base）
    url: https://focker.ir
    replaces-base: true
    # 若镜像站需要认证，取消下面两行并到仓库 Secrets 中配置
    # username: ${{ secrets.DOCKER_MIRROR_USER }}
    # password: ${{ secrets.DOCKER_MIRROR_PASSWORD }}

# 说明：
# - 每个镜像线使用独立的 /dependabot/<name>/docker-compose.yml，
#   避免同一个 dependency-name 在同一个文件中出现多行时 Dependabot 互相干扰。
# - mysql / nginx / redis 仅接受 patch 更新（忽略 minor / major）。
# - 每个 docker-compose 的 updates 已挂 registries: dockerhub，与 registries 段配合使用。

updates:
  # ---------- drone ----------
  - package-ecosystem: docker-compose
    directory: /dependabot/drone-runner
    registries:
      - dockerhub
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "feat"

  - package-ecosystem: docker-compose
    directory: /dependabot/drone-server
    registries:
      - dockerhub
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "feat"

