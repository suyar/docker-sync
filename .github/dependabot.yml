version: 2
updates:
  # docker-compose.yml 必须用 docker-compose；docker 生态只认 Dockerfile / Kubernetes YAML
  - package-ecosystem: docker-compose
    directory: /dependabot
    schedule:
      interval: daily
    open-pull-requests-limit: 15
    labels:
      - dependencies
      - docker
    commit-message:
      # 勿加尾部冒号，否则会变成 feat:: bump …
      prefix: "feat"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore"
