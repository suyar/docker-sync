version: 2

updates:
  # ---------- drone ----------
  - package-ecosystem: docker-compose
    directory: /dependabot/drone-runner
    schedule:
      interval: daily
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "feat"

  - package-ecosystem: docker-compose
    directory: /dependabot/drone-server
    schedule:
      interval: daily
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "feat"

